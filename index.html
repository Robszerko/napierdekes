<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Időjárás Érdekesség Beküldő</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 500px; width: 100%; }
        h2 { text-align: center; color: #333; margin-top: 0; }
        label { font-weight: bold; margin-top: 15px; display: block; color: #555; }
        input[type="date"], textarea { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-family: inherit; }
        textarea { resize: vertical; min-height: 150px; }
        button { margin-top: 20px; width: 100%; padding: 12px; background-color: #0088cc; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #006699; }
        .status { margin-top: 15px; text-align: center; font-weight: bold; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>

<div class="container">
    <h2>💡 Napi Érdekesség Beküldése</h2>
    
    <label for="datum">Melyik napra szóljon?</label>
    <input type="date" id="datum" required>

    <label for="szoveg">Az érdekesség szövege (akár HTML formázással is, pl. &lt;b&gt;félkövér&lt;/b&gt;):</label>
    <textarea id="szoveg" placeholder="Tudtad, hogy a legmagasabb hőmérsékletet..." required></textarea>

    <button onclick="elkuldAdat()">Beküldés az adatbázisba</button>

    <div id="statusMsg" class="status"></div>
</div>

<script>
    // IDE ÍRD A FIREBASE LINKEDET! (A perjel a végén nagyon fontos!)
    const FIREBASE_URL = "https://probaidojaras-default-rtdb.europe-west1.firebasedatabase.app/";

    // Automatikusan a mai nap beállítása a dátumválasztóban
    document.getElementById('datum').valueAsDate = new Date();

    async function elkuldAdat() {
        const datum = document.getElementById('datum').value;
        const szoveg = document.getElementById('szoveg').value.trim();
        const statusMsg = document.getElementById('statusMsg');

        if (!datum || !szoveg) {
            statusMsg.textContent = "Kérlek tölts ki minden mezőt!";
            statusMsg.className = "status error";
            return;
        }

        statusMsg.textContent = "Küldés folyamatban...";
        statusMsg.className = "status";

        // JSON adat összeállítása
        const adat = {
            text: szoveg,
            sent: false // Még nem lett elküldve Telegramra
        };

        // Mentés a Firebase-be PUT metódussal (felülírja az adott napit)
        const url = `${FIREBASE_URL}erdekessegek/${datum}.json`;

        try {
            const response = await fetch(url, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(adat)
            });

            if (response.ok) {
                statusMsg.textContent = "✅ Sikeresen elmentve! A robot ki fogja küldeni a megadott napon.";
                statusMsg.className = "status success";
                document.getElementById('szoveg').value = ""; // Töröljük a mezőt
            } else {
                throw new Error("Hiba a mentésnél.");
            }
        } catch (error) {
            statusMsg.textContent = "❌ Hiba történt: Nincs engedély az írásra a Firebase-ben!";
            statusMsg.className = "status error";
        }
    }
</script>

</body>
</html>
